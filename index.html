<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mapa Político Mundial — formas de gobierno y jefes de estado en tiempo real">
  <title>Mapa Político Mundial</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Leaflet -->
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
</head>
<body class="d-flex flex-column h-100">

  <!-- NAVBAR -->
  <header id="navbar-placeholder"></header>

  <!-- OFFCANVAS — Panel lateral de detalle de país -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="countryOffcanvas" aria-labelledby="countryOffcanvasLabel">
    <div class="offcanvas-header">
      <div>
        <span id="countryFlag" class="display-4 me-2"></span>
        <h5 class="offcanvas-title d-inline" id="countryOffcanvasLabel">País</h5>
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>
    <div class="offcanvas-body" id="offcanvasBody">
      <div class="text-center py-5" id="offcanvasLoader">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted small">Consultando Wikidata…</p>
      </div>
      <div id="offcanvasContent" class="d-none"></div>
    </div>
  </div>

  <!-- MAPA -->
  <main class="flex-shrink-0 map-wrapper">
    <div id="map"></div>
  </main>

  <!-- FOOTER -->
  <footer id="footer-placeholder"></footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
